spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 4

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  exposed:
    generate-ddl: false
