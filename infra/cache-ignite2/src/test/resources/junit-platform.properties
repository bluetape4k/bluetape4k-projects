junit.jupiter.extensions.autodetection.enabled=true
junit.jupiter.testinstance.lifecycle.default=per_class

junit.jupiter.execution.parallel.enabled=false
junit.jupiter.execution.parallel.mode.default=same_thread
junit.jupiter.execution.parallel.mode.classes.default=concurrent

# thin client 테스트(Suspend/NearCache)가 embedded Ignite 노드(JCache/IgniteNearCacheTest)보다
# 먼저 실행되어야 간섭 없이 동작합니다. IgniteNearCacheTest 는 IgniteCachingProvider 를 통해
# embedded Ignite 노드를 시작하므로 thin client 테스트 이후에 실행되어야 합니다.
junit.jupiter.testclass.order.default=org.junit.jupiter.api.ClassOrderer$OrderAnnotation
