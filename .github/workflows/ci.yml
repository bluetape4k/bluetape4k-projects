name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ── 1. Gradle Wrapper 검증 ────────────────────────────────────────────────
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  # ── 2. 전체 빌드 (테스트 제외) + Detekt ──────────────────────────────────
  build:
    name: Build & Detekt
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build (compile only)
        run: ./gradlew build -x test --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Detekt static analysis
        run: ./gradlew detekt --parallel

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: '**/build/reports/detekt/*.xml'
          retention-days: 7

  # ── 3. Core 모듈 테스트 (외부 의존성 없음) ────────────────────────────────
  test-core:
    name: Test / Core
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test bluetape4k core modules
        run: |
          ./gradlew \
            :bluetape4k-core:test \
            :bluetape4k-coroutines:test \
            :bluetape4k-logging:test \
            --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 4. I/O 모듈 테스트 (외부 의존성 없음) ────────────────────────────────
  test-io:
    name: Test / IO
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test io modules
        run: |
          ./gradlew \
            :bluetape4k-io:test \
            :bluetape4k-jackson:test \
            :bluetape4k-jackson3:test \
            :bluetape4k-fastjson2:test \
            --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-io
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 5. Utils 모듈 테스트 (외부 의존성 없음) ──────────────────────────────
  test-utils:
    name: Test / Utils
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test utils modules
        run: |
          ./gradlew \
            :bluetape4k-idgenerators:test \
            :bluetape4k-javatimes:test \
            :bluetape4k-math:test \
            :bluetape4k-money:test \
            :bluetape4k-junit5:test \
            --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-utils
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 6. Exposed core 테스트 (H2 인메모리, Docker 불필요) ──────────────────
  test-exposed-core:
    name: Test / Exposed Core (H2)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test exposed core modules with H2
        run: |
          ./gradlew \
            :bluetape4k-exposed-core:test \
            :bluetape4k-exposed-dao:test \
            :bluetape4k-exposed-jackson:test \
            :bluetape4k-exposed-jackson3:test \
            :bluetape4k-exposed-fastjson2:test \
            --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          TEST_DB: h2

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-exposed-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 7. Testcontainers (Docker 필요) 핵심 모듈 테스트 ─────────────────────
  test-docker:
    name: Test / Docker (Testcontainers)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test with Testcontainers
        run: |
          ./gradlew \
            :bluetape4k-exposed-jdbc:test \
            :bluetape4k-exposed-r2dbc:test \
            :bluetape4k-exposed-postgresql:test \
            :bluetape4k-lettuce:test \
            --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: "unix:///var/run/docker.sock"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-docker
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 8. 결과 집계 ──────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [build, test-core, test-io, test-utils, test-exposed-core, test-docker]
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed"
