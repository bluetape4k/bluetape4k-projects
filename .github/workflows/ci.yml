name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 0. 시크릿 스캔 ────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --redact --no-git

  # ── 1. Gradle Wrapper 검증 ────────────────────────────────────────────────
  validate-wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4

  # ── 2. 전체 빌드 (테스트 제외) + Detekt ──────────────────────────────────
  build:
    name: Build & Detekt
    runs-on: ubuntu-latest
    needs: validate-wrapper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build (compile only)
        run: ./gradlew build -x test --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Detekt static analysis
        run: ./gradlew detekt --parallel

      - name: Upload detekt report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: '**/build/reports/detekt/*.xml'
          retention-days: 7

  # ── 3. Core 모듈 테스트 (외부 의존성 없음) ────────────────────────────────
  test-core:
    name: Test / Core
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test bluetape4k core modules
        run: |
          ./gradlew \
            :bluetape4k-core:test \
            :bluetape4k-coroutines:test \
            :bluetape4k-logging:test \
            --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 4. I/O 모듈 테스트 (외부 의존성 없음) ────────────────────────────────
  test-io:
    name: Test / IO
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test io modules
        run: |
          ./gradlew \
            :bluetape4k-io:test \
            :bluetape4k-jackson:test \
            :bluetape4k-jackson3:test \
            :bluetape4k-fastjson2:test \
            --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-io
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 5. Utils 모듈 테스트 (외부 의존성 없음) ──────────────────────────────
  test-utils:
    name: Test / Utils
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test utils modules
        run: |
          ./gradlew \
            :bluetape4k-idgenerators:test \
            :bluetape4k-javatimes:test \
            :bluetape4k-math:test \
            :bluetape4k-money:test \
            :bluetape4k-junit5:test \
            --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Duser.language=en -Duser.country=US"
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-utils
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 6. Exposed core 테스트 (H2 인메모리, Docker 불필요) ──────────────────
  test-exposed-core:
    name: Test / Exposed Core (H2)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test exposed core modules with H2
        run: |
          ./gradlew \
            :bluetape4k-exposed-core:test \
            :bluetape4k-exposed-dao:test \
            :bluetape4k-exposed-jackson2:test \
            :bluetape4k-exposed-jackson3:test \
            :bluetape4k-exposed-fastjson2:test \
            --parallel
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          TEST_DB: h2

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-exposed-core
          path: '**/build/test-results/test/*.xml'
          retention-days: 7

  # ── 7. 결과 집계 ──────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [gitleaks, build, test-core, test-io, test-utils, test-exposed-core]
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Job results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed"
