name: Nightly Tests (Testcontainers)

on:
  schedule:
    - cron: '0 18 * * *'  # 매일 03:00 KST (18:00 UTC)
  workflow_dispatch:

concurrency:
  group: nightly-tests
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Exposed JDBC/R2DBC (PostgreSQL) ──────────────────────────────────────
  test-exposed-db:
    name: Test / Exposed DB (PostgreSQL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test exposed JDBC/R2DBC modules
        run: |
          ./gradlew \
            :bluetape4k-exposed-jdbc:test \
            :bluetape4k-exposed-r2dbc:test \
            :bluetape4k-exposed-postgresql:test \
            --no-daemon --no-configuration-cache
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: "unix:///var/run/docker.sock"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-results-exposed-db
          path: '**/build/test-results/test/*.xml'
          retention-days: 14

  # ── Infra (Lettuce / Redisson) ────────────────────────────────────────────
  test-infra:
    name: Test / Infra (Lettuce, Redisson)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: true

      - name: Test infra modules
        run: |
          ./gradlew \
            :bluetape4k-lettuce:test \
            :bluetape4k-redisson:test \
            --no-daemon --no-configuration-cache
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"
          TESTCONTAINERS_RYUK_DISABLED: "true"
          DOCKER_HOST: "unix:///var/run/docker.sock"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-results-infra
          path: '**/build/test-results/test/*.xml'
          retention-days: 14

  # ── 결과 집계 ─────────────────────────────────────────────────────────────
  nightly-status:
    name: Nightly Status
    runs-on: ubuntu-latest
    needs: [test-exposed-db, test-infra]
    if: always()
    steps:
      - name: Check all jobs
        env:
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          echo "Nightly results: $RESULTS"
          if echo "$RESULTS" | grep -qE "failure|cancelled"; then
            echo "Nightly tests failed"
            exit 1
          fi
          echo "Nightly tests passed"
