<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Login</title>
<style>body{font-family:sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f5f5f5}
.card{background:#fff;padding:40px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);width:300px}
h2{text-align:center;margin-bottom:20px}input{width:100%;padding:10px;margin:8px 0;box-sizing:border-box;border:1px solid #ddd;border-radius:4px}
button{width:100%;padding:12px;background:#4285f4;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:16px}</style>
</head>
<body>
<div class="card">
  <h2>Sign In</h2>
  <form method="POST" action="/httpbin/post">
    <input type="text" name="username" placeholder="Username">
    <input type="password" name="password" placeholder="Password">
    <button type="submit">Login</button>
  </form>
</div>
</body>
</html>
