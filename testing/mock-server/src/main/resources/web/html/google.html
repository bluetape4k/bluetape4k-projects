<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Google</title>
<style>body{font-family:arial,sans-serif;margin:0;padding:0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
.logo{font-size:72px;margin-bottom:30px}.blue{color:#4285f4}.red{color:#ea4335}.yellow{color:#fbbc05}.green{color:#34a853}
.search-box{display:flex;gap:10px}.search-box input{width:450px;padding:12px;font-size:16px;border:1px solid #dfe1e5;border-radius:24px}</style>
</head>
<body>
<div class="logo">
  <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span>
  <span class="blue">g</span><span class="green">l</span><span class="red">e</span>
</div>
<div class="search-box">
  <input type="text" placeholder="Search Google or type a URL">
  <button>Google Search</button>
</div>
</body>
</html>
